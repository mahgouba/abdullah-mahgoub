    </script>
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; }
        .material-symbols-outlined { vertical-align: middle; }

</head>
<body class="bg-gray-50 min-h-screen">
    <header class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-primary">إدارة السيرة الذاتية</h1>
            <a href="code.html" class="flex items-center gap-2 bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-900">
                <span class="material-symbols-outlined">visibility</span>
                عرض السيرة
            </a>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-xl font-bold mb-4 text-primary">البيانات الأساسية</h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">الاسم</label>
                        <input type="text" id="name" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">الصورة الشخصية</label>
                        <div class="flex flex-col gap-2">
                            <img id="avatarPreview" class="w-24 h-24 rounded-full object-cover border" src="" alt="معاينة">
                            <input type="file" id="avatarUpload" accept="image/*" class="text-sm">
                            <input type="text" id="avatar" placeholder="أو رابط الصورة" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block mb-1 font-medium text-gray-700">المقدمة الوظيفية</label>
                        <textarea id="title" rows="3" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">سنة الميلاد</label>
                        <input type="text" id="birthYear" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">الموقع</label>
                        <input type="text" id="location" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">البريد</label>
                        <input type="email" id="email" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">الهاتف</label>
                        <input type="text" id="phone" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-primary">المهارات</h2>
                    <button id="addSkill" class="flex items-center gap-2 bg-gray-700 text-white px-3 py-1.5 rounded-lg hover:bg-gray-800">
                        <span class="material-symbols-outlined">add</span>
                        إضافة مهارة
                    </button>
                </div>
                <div id="skillsContainer" class="space-y-2"></div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-primary">اللغات</h2>
                    <button id="addLanguage" class="flex items-center gap-2 bg-gray-700 text-white px-3 py-1.5 rounded-lg hover:bg-gray-800">
                        <span class="material-symbols-outlined">add</span>
                        إضافة لغة
                    </button>
                </div>
                <div id="languagesContainer" class="space-y-3"></div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-primary">الخبرة العملية</h2>
                    <button id="addExperience" class="flex items-center gap-2 bg-gray-700 text-white px-3 py-1.5 rounded-lg hover:bg-gray-800">
                        <span class="material-symbols-outlined">add</span>
                        إضافة خبرة
                    </button>
                </div>
                <div id="experiencesContainer" class="space-y-4"></div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h2 class="text-xl font-bold mb-4 text-primary">التعليم</h2>
                <div class="grid md:grid-cols-3 gap-4">
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">الجامعة</label>
                        <input type="text" id="university" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">الدرجة</label>
                        <input type="text" id="degree" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                    <div>
                        <label class="block mb-1 font-medium text-gray-700">سنة التخرج</label>
                        <input type="text" id="gradYear" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary focus:outline-none">
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-primary">الدورات</h2>
                    <button id="addCourse" class="flex items-center gap-2 bg-gray-700 text-white px-3 py-1.5 rounded-lg hover:bg-gray-800">
                        <span class="material-symbols-outlined">add</span>
                        إضافة دورة
                    </button>
                </div>
                <div id="coursesContainer" class="space-y-3"></div>
            </div>
            
            <div class="flex gap-3 justify-end">
                <button id="resetBtn" class="bg-red-600 text-white px-6 py-2.5 rounded-lg hover:bg-red-700">إعادة ضبط</button>
                <button id="saveBtn" class="bg-primary text-white px-6 py-2.5 rounded-lg hover:bg-blue-900">حفظ التغييرات</button>
            </div>
        </div>
    </main>
    <script>
        const defaultData = {
            name: "عبدالله محجوب عبدالرسول",
            title: "مصمم جرافيك مبدع ومتخصص في الدعم الفني وتقنية المعلومات، أمتلك خبرة متنوعة في المبيعات وإدارة علاقات العملاء. أجمع بين الحس الفني والمهارات التقنية لتحقيق حلول متكاملة تخدم أهداف العمل.",
            avatar: "https://lh3.googleusercontent.com/aida-public/AB6AXuD5GtKXL3C6Q78MDyXPku_nBW0-O9QU6Vjx6ikzfZIJgrq8WtfQ4uwGIqZu4R36Gj6I2y_sZHlDyhULuT7fSpG2jAjt9W8Ep7CT6MFn6jp5w2CKF_xgV3jWHbaU4LsRLTWvFEC4BZHhwra5GJY5-o7KBPi4pv-4ozr8_krtCVjyFEjYg3PdUlyNJeTsOIL0wmNSLT73nmsOIhZGnY9ht-RxMC05YOf5Mp-a8ZTVXIdNtMlYG588JkxJJVZpOB2RVHuAAQAhR0w7YxxSsXc",
            birthYear: "1997",
            location: "الرياض , حي القادسية , السعودية",
            email: "3bdullah.mahgoub@gmail.com",
            phone: "+966 511364638",
            skills: ["Adobe Photoshop", "Illustrator", "Premiere Pro", "After Effects", "MS Office Expert", "IT Support", "Hardware Setup"],
            languages: [
                { name: "العربية (الأم)", level: 100 },
                { name: "الإنجليزية", level: 70 }
            ],
            experiences: [
                {
                    title: "مصمم جرافيك (عمل حر)",
                    company: "Freelance Designer",
                    category: "التصميم",
                    description: [
                        "تصميم الإعلانات التجارية والمواد الترويجية للسوشيال ميديا.",
                        "بناء الهويات البصرية الكاملة للشركات والناشئين.",
                        "تصميم المطبوعات الورقية والبنرات واللوحات الإعلانية."
                    ]
                },
                {
                    title: "IT Help Desk",
                    company: "شركة ماس دي سوفت & شركة دكتور فارما",
                    category: "خبرة تقنية متخصصة",
                    description: [
                        "تقديم الدعم الفني المباشر للموظفين وحل المشكلات التقنية الطارئة.",
                        "إعداد وتجهيز أجهزة الحاسب الآلي والملحقات والشبكات الداخلية.",
                        "متابعة الأنظمة البرمجية وضمان استمرارية العمل بكفاءة عالية."
                    ]
                },
                {
                    title: "مبيعات وإداري",
                    company: "شركة العلم الدولي & شركة البريمي للسيارات",
                    category: "خدمة عملاء وإدارة",
                    description: [
                        "إدارة عمليات المبيعات المباشرة وخدمة العملاء والارتقاء بتجربة المشتري.",
                        "متابعة عقود المبيعات والإجراءات الإدارية المرتبطة بالبنوك والتمويل.",
                        "تحقيق الأهداف البيعية المخطط لها والمساهمة في نمو الحصة السوقية."
                    ]
                }
            ],
            education: {
                university: "الجامعة العمالية",
                degree: "بكالوريوس",
                year: "2019"
            },
            courses: [
                { name: "Web Development", description: "تطوير المواقع الإلكترونية", icon: "code" },
                { name: "Multimedia & Graphics", description: "الوسائط المتعددة والتصميم", icon: "brush" },
                { name: "دورات NTI", description: "المعهد القومي للاتصالات", icon: "hub" },
                { name: "Sales & Communication", description: "مهارات البيع والتواصل", icon: "groups" }
            ]
        };
        
        let data = JSON.parse(localStorage.getItem('resumeData')) || JSON.parse(JSON.stringify(defaultData));
        
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        
        function renderSkills() {
            document.getElementById('skillsContainer').innerHTML = data.skills.map((s, i) => `
                <div class="flex gap-2 items-center">
                    <input type="text" class="skill-input flex-1 p-2 border rounded" value="${s}" data-index="${i}">
                    <button class="remove-skill bg-red-500 text-white p-2 rounded" data-index="${i}">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            `).join('');
        }
        
        function renderLanguages() {
            document.getElementById('languagesContainer').innerHTML = data.languages.map((l, i) => `
                <div class="border p-4 rounded-lg">
                    <div class="flex gap-4 items-center">
                        <input type="text" class="lang-name flex-1 p-2 border rounded" value="${l.name}" data-index="${i}" placeholder="اللغة">
                        <input type="number" min="0" max="100" class="lang-level w-24 p-2 border rounded" value="${l.level}" data-index="${i}" placeholder="%" oninput="validateLanguageLevel(this)">
                        <button class="remove-lang bg-red-500 text-white p-2 rounded" data-index="${i}">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function validateLanguageLevel(input) {
            let val = parseInt(input.value);
            if (isNaN(val) || val < 0) input.value = 0;
            else if (val > 100) input.value = 100;
        }
        
        function renderExperiences() {
            document.getElementById('experiencesContainer').innerHTML = data.experiences.map((exp, i) => `
                <div class="border p-4 rounded-lg">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-semibold text-lg">الخبرة ${i + 1}</h3>
                        <button class="remove-exp bg-red-500 text-white p-2 rounded" data-index="${i}">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                    <div class="grid md:grid-cols-2 gap-3 mb-3">
                        <input type="text" class="exp-title p-2 border rounded" value="${exp.title}" data-index="${i}" placeholder="المسمى الوظيفي">
                        <input type="text" class="exp-company p-2 border rounded" value="${exp.company}" data-index="${i}" placeholder="الشركة">
                        <input type="text" class="exp-category md:col-span-2 p-2 border rounded" value="${exp.category}" data-index="${i}" placeholder="التصنيف">
                    </div>
                    <div class="mb-2">
                        <div class="flex justify-between mb-2">
                            <label class="font-medium">الوصف</label>
                            <button class="add-desc text-primary flex items-center gap-1 hover:underline" data-index="${i}">
                                <span class="material-symbols-outlined">add</span> إضافة نقطة
                            </button>
                        </div>
                        <div class="exp-desc space-y-2" data-index="${i}">
                            ${exp.description.map((d, di) => `
                                <div class="flex gap-2 items-center">
                                    <textarea class="desc-text flex-1 p-2 border rounded" rows="1" data-exp="${i}" data-desc="${di}">${d}</textarea>
                                    <button class="remove-desc bg-red-500 text-white p-2 rounded" data-exp="${i}" data-desc="${di}">
                                        <span class="material-symbols-outlined">delete</span>
                                    </button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function renderCourses() {
            document.getElementById('coursesContainer').innerHTML = data.courses.map((c, i) => `
                <div class="border p-4 rounded-lg">
                    <div class="flex justify-between">
                        <div class="grid md:grid-cols-3 gap-3 flex-1 mr-3">
                            <input type="text" class="course-name p-2 border rounded" value="${c.name}" data-index="${i}" placeholder="اسم الدورة">
                            <input type="text" class="course-desc p-2 border rounded" value="${c.description}" data-index="${i}" placeholder="الوصف">
                            <input type="text" class="course-icon p-2 border rounded" value="${c.icon}" data-index="${i}" placeholder="أيقونة">
                        </div>
                        <button class="remove-course bg-red-500 text-white p-2 rounded" data-index="${i}">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function loadForm() {
            document.getElementById('name').value = data.name;
            document.getElementById('avatar').value = data.avatar;
            document.getElementById('avatarPreview').src = data.avatar;
            document.getElementById('title').value = data.title;
            document.getElementById('birthYear').value = data.birthYear;
            document.getElementById('location').value = data.location;
            document.getElementById('email').value = data.email;
            document.getElementById('phone').value = data.phone;
            document.getElementById('university').value = data.education.university;
            document.getElementById('degree').value = data.education.degree;
            document.getElementById('gradYear').value = data.education.year;
            
            renderSkills();
            renderLanguages();
            renderExperiences();
            renderCourses();
        }
        
        function save() {
            data.name = document.getElementById('name').value;
            data.avatar = document.getElementById('avatar').value;
            data.title = document.getElementById('title').value;
            data.birthYear = document.getElementById('birthYear').value;
            data.location = document.getElementById('location').value;
            data.email = document.getElementById('email').value;
            data.phone = document.getElementById('phone').value;
            data.education.university = document.getElementById('university').value;
            data.education.degree = document.getElementById('degree').value;
            data.education.year = document.getElementById('gradYear').value;
            
            data.skills = Array.from(document.querySelectorAll('.skill-input')).map(el => el.value);
            
            data.languages = Array.from(document.querySelectorAll('.lang-name')).map((el, i) => {
                let level = parseInt(document.querySelectorAll('.lang-level')[i].value);
                if (isNaN(level) || level < 0) level = 0;
                if (level > 100) level = 100;
                return {
                    name: el.value,
                    level: level
                };
            });
            
            data.experiences = Array.from(document.querySelectorAll('#experiencesContainer > div')).map((_, i) => ({
                title: document.querySelectorAll('.exp-title')[i].value,
                company: document.querySelectorAll('.exp-company')[i].value,
                category: document.querySelectorAll('.exp-category')[i].value,
                description: Array.from(document.querySelectorAll(`.desc-text[data-exp="${i}"]`)).map(t => t.value)
            }));
            
            data.courses = Array.from(document.querySelectorAll('.course-name')).map((el, i) => ({
                name: el.value,
                description: document.querySelectorAll('.course-desc')[i].value,
                icon: document.querySelectorAll('.course-icon')[i].value
            }));
            
            localStorage.setItem('resumeData', JSON.stringify(data));
            alert('تم الحفظ بنجاح!');
        }
        
        function reset() {
            if (confirm('هل تريد إعادة ضبط كل البيانات؟')) {
                data = JSON.parse(JSON.stringify(defaultData));
                localStorage.setItem('resumeData', JSON.stringify(data));
                loadForm();
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadForm();
            
            document.getElementById('addSkill').addEventListener('click', () => {
                data.skills.push('مهارة جديدة');
                renderSkills();
            });
            
            document.getElementById('addLanguage').addEventListener('click', () => {
                data.languages.push({ name: 'لغة جديدة', level: 50 });
                renderLanguages();
            });
            
            document.getElementById('addExperience').addEventListener('click', () => {
                data.experiences.push({
                    title: 'الوظيفة الجديدة',
                    company: 'الشركة',
                    category: 'التصنيف',
                    description: ['نقطة وصفية']
                });
                renderExperiences();
            });
            
            document.getElementById('addCourse').addEventListener('click', () => {
                data.courses.push({ name: 'دورة جديدة', description: 'الوصف', icon: 'school' });
                renderCourses();
            });
            
            document.getElementById('skillsContainer').addEventListener('click', (e) => {
                if (e.target.closest('.remove-skill')) {
                    const i = parseInt(e.target.closest('.remove-skill').dataset.index);
                    data.skills.splice(i, 1);
                    renderSkills();
                }
            });
            
            document.getElementById('languagesContainer').addEventListener('click', (e) => {
                if (e.target.closest('.remove-lang')) {
                    const i = parseInt(e.target.closest('.remove-lang').dataset.index);
                    data.languages.splice(i, 1);
                    renderLanguages();
                }
            });
            
            document.getElementById('experiencesContainer').addEventListener('click', (e) => {
                if (e.target.closest('.remove-exp')) {
                    const i = parseInt(e.target.closest('.remove-exp').dataset.index);
                    data.experiences.splice(i, 1);
                    renderExperiences();
                }
                if (e.target.closest('.add-desc')) {
                    const i = parseInt(e.target.closest('.add-desc').dataset.index);
                    data.experiences[i].description.push('نقطة وصفية جديدة');
                    renderExperiences();
                }
                if (e.target.closest('.remove-desc')) {
                    const exp = parseInt(e.target.closest('.remove-desc').dataset.exp);
                    const desc = parseInt(e.target.closest('.remove-desc').dataset.desc);
                    data.experiences[exp].description.splice(desc, 1);
                    renderExperiences();
                }
            });
            
            document.getElementById('coursesContainer').addEventListener('click', (e) => {
                if (e.target.closest('.remove-course')) {
                    const i = parseInt(e.target.closest('.remove-course').dataset.index);
                    data.courses.splice(i, 1);
                    renderCourses();
                }
            });
            
            document.getElementById('avatarUpload').addEventListener('change', async (e) => {
                if (e.target.files && e.target.files[0]) {
                    const file = e.target.files[0];
                    // Check file size limit (1MB)
                    if (file.size > 1 * 1024 * 1024) {
                        alert('الصورة كبيرة جدًا! الحد الأقصى 1MB');
                        return;
                    }
                    const base64 = await fileToBase64(file);
                    data.avatar = base64;
                    document.getElementById('avatar').value = base64;
                    document.getElementById('avatarPreview').src = base64;
                }
            });
            
            document.getElementById('avatar').addEventListener('input', (e) => {
                data.avatar = e.target.value;
                document.getElementById('avatarPreview').src = e.target.value;
            });
            
            document.getElementById('saveBtn').addEventListener('click', save);
            document.getElementById('resetBtn').addEventListener('click', reset);
        });
    </script>
</body>
</html>
